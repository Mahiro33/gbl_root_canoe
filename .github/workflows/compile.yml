name: Build gbl_root_canoe

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # edk2 目录可能含子模块

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld llvm \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            nasm iasl \
            python3 python3-pip \
            uuid-dev \
            xxd zip

      - name: Upload abl.img (must be pre-placed in repo or via secret)
        # 如果 abl.img 已经提交到仓库，此步骤可跳过
        # 否则需要通过 GitHub Secrets 或 release asset 获取
        run: |
          if [ ! -f images/abl.img ]; then
            echo "ERROR: images/abl.img not found!"
            echo "Please commit abl.img to the images/ folder, or adjust this step."
            exit 1
          fi

      - name: Build (patch + compile)
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gbl-root-canoe-build
          path: dist/
          retention-days: 30
