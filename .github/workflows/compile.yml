name: Build gbl_root_canoe

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive  # edk2 目录可能含子模块

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang lld llvm \
            gcc-aarch64-linux-gnu \
            binutils-aarch64-linux-gnu \
            nasm iasl \
            python3 python3-pip \
            uuid-dev \
            xxd zip

      - name: Build (patch + compile)
        run: make build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gbl-root-canoe-build
          path: dist/
          retention-days: 30
